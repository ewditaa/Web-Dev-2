<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Event Dashboard</title>
  <link rel="stylesheet" href="/smartevent.css" />
</head>

<body>

  <header>
    <h1>🎯 Smart Event Dashboard</h1>
  </header>

  <main class="container">

    <!-- LEFT PANEL -->
    <section class="card-panel">
      <h2>Add New Event</h2>

      <form id="eventForm">

        <div class="input-group">
          <label>Event Title:</label>
          <input type="text" id="eventTitle" required placeholder="Enter event name..." />
        </div>

        <div class="input-group">
          <label>Event Date:</label>
          <input type="date" id="eventDate" required />
        </div>

        <div class="input-group">
          <label>Category:</label>
          <select id="eventCategory">
            <option value="Conference">Conference</option>
            <option value="Workshop">Workshop</option>
            <option value="Social">Social</option>
          </select>
        </div>

        <div class="input-group">
          <label>Description:</label>
          <textarea id="eventDescription" rows="3" placeholder="Brief details..."></textarea>
        </div>

        <button type="submit" id="addBtn">Add Event</button>

      </form>
    </section>

    <!-- RIGHT PANEL -->
    <section class="card-panel">
      <div class="header-row">
        <h2>My Events</h2>

        <div class="controls">
          <button id="clearAll" class="btn-alt">Clear All Events</button>
          <button id="addSample" class="btn-alt">Add Sample Events</button>
        </div>
      </div>

      <div id="eventList" class="event-grid">
        <p class="empty-msg">No events yet. Add your first event!</p>
      </div>
    </section>

  </main>

  <script src="/smartevent.js"></script>

</body>
</html>
